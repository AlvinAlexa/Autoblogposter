<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sports 803 · AI Auto-Post Dashboard v5</title>
<style>
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;
  --accent:#e63946;--accent2:#f4a261;--blue:#4cc9f0;--green:#06d6a0;
  --text:#e2e8f0;--muted:#64748b;--card:#111827;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer;border:none;border-radius:6px;padding:7px 14px;font-weight:600;transition:0.2s;display:inline-flex;align-items:center;gap:6px;font-size:13px}
button:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#ff4d5a}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg3)}

/* Layout */
.app-container{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.main-content{padding:25px;max-width:1400px;margin:0 auto;width:100%}

/* Header/Stats */
.dashboard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.stat-bar{display:flex;gap:15px;margin-bottom:20px}
.stat-item{background:var(--card);padding:10px 15px;border-radius:var(--radius);border:1px solid var(--border);flex:1}
.stat-val{display:block;font-size:20px;font-weight:bold;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase}

/* Grid & Cards */
.event-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:15px}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;position:relative;transition:0.2s}
.event-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.event-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.teams-area{display:flex;align-items:center;justify-content:space-between;margin:10px 0;text-align:center}
.team-slot{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.team-logo{width:50px;height:50px;object-fit:contain;background:var(--bg3);border-radius:50%;padding:5px;border:1px solid var(--border)}
.team-name{font-weight:600;font-size:13px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vs{color:var(--muted);font-weight:bold;font-size:12px;margin:0 10px}

/* Modals/Pages */
.page{display:none}.page.active{display:block}
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999}
.toast{padding:12px 20px;background:var(--bg3);border-left:4px solid var(--blue);border-radius:6px;margin-top:10px;animation:slideIn 0.3s ease-out;box-shadow:0 10px 25px rgba(0,0,0,0.5)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <h2 style="color:var(--accent);margin-bottom:25px">Sports 803</h2>
    <nav style="display:flex;flex-direction:column;gap:5px;flex:1">
      <button class="btn-outline" onclick="openPage('dashboard')">🏠 Dashboard</button>
      <button class="btn-outline" onclick="openPage('channels')">📺 Channels</button>
      <button class="btn-outline" onclick="openPage('post-editor')">✍️ Manual Post</button>
      <button class="btn-outline" onclick="openPage('settings')">⚙️ Settings</button>
    </nav>
    <div id="auth-section" style="padding-top:20px;border-top:1px solid var(--border)">
       <button id="auth-btn" class="btn-primary" style="width:100%" onclick="handleAuth()">Sign in with Google</button>
       <p id="auth-status" style="font-size:11px;margin-top:8px;color:var(--muted)">🔴 Not Connected</p>
    </div>
  </aside>

  <main class="main-content">
    <div id="page-dashboard" class="page active">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
        <div style="display:flex;gap:10px">
          <button id="fetch-btn" class="btn-primary" onclick="fetchAllEvents()">📥 Fetch Events</button>
          <button class="btn-outline" onclick="toggleScheduler()" id="sched-btn">⏰ Start Scheduler</button>
        </div>
      </div>

      <div class="stat-bar">
        <div class="stat-item"><span class="stat-val" id="stat-leagues">0</span><span class="stat-lbl">Active Leagues</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-events">0</span><span class="stat-lbl">Upcoming Matches</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-channels">0</span><span class="stat-lbl">Connected Channels</span></div>
      </div>

      <div id="events-loader" style="display:none;text-align:center;padding:50px">🔄 Loading events and resolving logos...</div>
      <div id="events-container" class="event-grid"></div>
    </div>

    <div id="page-settings" class="page">
        <h2>System Settings</h2>
        <div style="background:var(--card);padding:20px;border-radius:var(--radius);margin-top:15px;display:flex;flex-direction:column;gap:15px">
            <div><label>Blogger Blog ID</label><input type="text" id="cfg-blogid" placeholder="123456789"></div>
            <div><label>Google Client ID</label><input type="text" id="cfg-clientid" placeholder="xxxx.apps.googleusercontent.com"></div>
            <div><label>ImgBB API Key</label><input type="text" id="cfg-imgbb" placeholder="c8cd5657bfdfc6c298c9366deebfa7a7"></div>
            <button class="btn-primary" onclick="saveConfig()">Save Configuration</button>
        </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & CONSTANTS
// ═══════════════════════════════════════════════════════════
const MANUAL_LOGOS = {
  "manchester united": "https://www.thesportsdb.com/images/media/team/badge/vshvcu1545564483.png",
  "arsenal": "https://www.thesportsdb.com/images/media/team/badge/uy7lty1535904718.png",
  "chelsea": "https://www.thesportsdb.com/images/media/team/badge/vwrptq1448812907.png",
  "psg": "https://www.thesportsdb.com/images/media/team/badge/rwqrut1448812832.png",
  "real madrid": "https://www.thesportsdb.com/images/media/team/badge/v79v541545561129.png",
  "barcelona": "https://www.thesportsdb.com/images/media/team/badge/08460t1535904059.png"
};

const LEAGUE_MAP = {
  'epl': 'soccer/eng.1', 'laliga': 'soccer/esp.1', 'seriea': 'soccer/ita.1',
  'bundesliga': 'soccer/ger.1', 'ligue1': 'soccer/fra.1', 'ucl': 'soccer/uefa.champions',
  'nba': 'basketball/nba', 'ufc': 'mma/ufc', 'worldcup': 'soccer/fifa.world',
  'euro': 'soccer/uefa.euro', 'afcon': 'soccer/caf.nations',
  'intlfriendly': 'soccer/fifa.friendly', 'wworldcup': 'soccer/fifa.w.world',
  'wsl': 'soccer/eng.w.1', 'cricket': 'cricket/icc.champions'
};

const LOGO_CACHE_KEY = 's803_logo_cache_v5';
let CFG = {
  blogId: '', clientId: '', imgbbKey: 'c8cd5657bfdfc6c298c9366deebfa7a7',
  activeLeagues: Object.keys(LEAGUE_MAP), postTiming: 60
};

let accessToken = null;
let allEvents = [];
let channels = [];
let schedulerInterval = null;

// ═══════════════════════════════════════════════════════════
// LOGO RESOLUTION SYSTEM
// ═══════════════════════════════════════════════════════════

function normalizeTeamName(name) {
  if (!name) return "";
  let n = name.toLowerCase();
  if (n.includes('man utd')) return 'manchester united';
  if (n.includes('man city')) return 'manchester city';
  if (n === 'psg') return 'paris saint-germain';
  if (n === 'spurs') return 'tottenham hotspur';
  return name;
}

function proxyUrl(url) {
  if (!url || url.includes('data:')) return url;
  // Using weserv as proxy for CORS and resizing
  return `https://images.weserv.nl/?url=${encodeURIComponent(url.replace(/^https?:\/\//, ''))}&w=120&fit=contain&errorredirect=https://via.placeholder.com/100`;
}

async function fetchTheSportsDB(teamName) {
  try {
    const query = normalizeTeamName(teamName);
    const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${encodeURIComponent(query)}`);
    const data = await res.json();
    return data.teams?.[0]?.strTeamBadge || null;
  } catch (e) { return null; }
}

async function fetchFighterImage(name) {
  try {
    const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p=${encodeURIComponent(name)}`);
    const data = await res.json();
    return data.players?.[0]?.strThumb || null;
  } catch (e) { return null; }
}

function fetchCricketLogo(teamName) {
  // Simple mapping for common nations to FlagCDN
  const maps = { 'india':'in', 'australia':'au', 'england':'gb-eng', 'pakistan':'pk', 'south africa':'za' };
  const code = maps[teamName.toLowerCase()];
  return code ? `https://flagcdn.com/w160/${code}.png` : null;
}

async function resolveLogo(espnUrl, teamName, leagueId) {
  const norm = teamName.toLowerCase();
  
  // 1. Manual Override
  if (MANUAL_LOGOS[norm]) return proxyUrl(MANUAL_LOGOS[norm]);

  // 2. Cache Check
  const cache = getLogoCache();
  if (cache[norm]) return proxyUrl(cache[norm]);

  console.log(`[LogoSystem] Resolving: ${teamName} (${leagueId})`);

  let result = null;
  
  // 3. ESPN Source (if it's a real logo and not a generic placeholder)
  if (espnUrl && !espnUrl.includes('default')) {
     result = espnUrl;
  } 
  // 4. Fighter Image (UFC)
  else if (leagueId === 'ufc') {
     result = await fetchFighterImage(teamName);
  }
  // 5. Cricket
  else if (leagueId === 'cricket') {
     result = fetchCricketLogo(teamName);
  }

  // 6. TheSportsDB Fallback
  if (!result) {
    result = await fetchTheSportsDB(teamName);
  }

  if (result) {
    setCachedLogo(norm, result);
    return proxyUrl(result);
  }

  return ""; // Default to first-letter avatar in UI
}

// ═══════════════════════════════════════════════════════════
// CACHE HELPERS
// ═══════════════════════════════════════════════════════════
function getLogoCache() {
  try { return JSON.parse(localStorage.getItem(LOGO_CACHE_KEY)) || {}; } 
  catch(e) { return {}; }
}
function setCachedLogo(name, url) {
  const cache = getLogoCache();
  cache[name.toLowerCase()] = url;
  localStorage.setItem(LOGO_CACHE_KEY, JSON.stringify(cache));
}

// ═══════════════════════════════════════════════════════════
// CORE FETCH LOGIC
// ═══════════════════════════════════════════════════════════

async function fetchEventsForLeague(lid) {
  const slug = LEAGUE_MAP[lid];
  if (!slug) return [];
  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${slug}/scoreboard`);
    const data = await res.json();
    return (data.events || []).map(ev => {
      const comp = ev.competitions[0];
      return {
        id: ev.id,
        leagueId: lid,
        title: ev.name,
        time: new Date(ev.date),
        status: ev.status.type.shortDetail,
        homeTeam: comp.competitors[0].team.displayName,
        awayTeam: comp.competitors[1].team.displayName,
        homeLogoRaw: comp.competitors[0].team.logo,
        awayLogoRaw: comp.competitors[1].team.logo,
        homeLogo: '', 
        awayLogo: ''
      };
    });
  } catch(e) { console.error(`Failed ${lid}:`, e); return []; }
}

async function fetchAllEvents() {
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = '🔄 Fetching...';
  
  allEvents = [];
  const pool = CFG.activeLeagues.map(l => fetchEventsForLeague(l));
  const results = await Promise.allSettled(pool);
  
  results.forEach(r => { if(r.status==='fulfilled') allEvents.push(...r.value); });
  allEvents.sort((a,b) => a.time - b.time);
  
  renderEvents();
  
  // Async logo enrichment
  await enrichEventLogos(allEvents);
  
  btn.disabled = false;
  btn.textContent = '📥 Fetch Events';
}

async function enrichEventLogos(events) {
  console.log("[LogoSystem] Enriching event logos...");
  const promises = events.map(async (ev) => {
    ev.homeLogo = await resolveLogo(ev.homeLogoRaw, ev.homeTeam, ev.leagueId);
    ev.awayLogo = await resolveLogo(ev.awayLogoRaw, ev.awayTeam, ev.leagueId);
  });
  
  await Promise.allSettled(promises);
  localStorage.setItem('s803_events_v5', JSON.stringify(events));
  renderEvents();
}

function renderEvents() {
  const container = document.getElementById('events-container');
  container.innerHTML = allEvents.map(ev => `
    <div class="event-card">
      <div class="event-meta">
        <span>${ev.leagueId.toUpperCase()}</span>
        <span>${ev.time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
      </div>
      <div class="teams-area">
        <div class="team-slot">
          ${ev.homeLogo ? `<img class="team-logo" src="${ev.homeLogo}">` : `<div class="team-logo" style="display:flex;align-items:center;justify-content:center;background:var(--accent)">${ev.homeTeam[0]}</div>`}
          <span class="team-name">${ev.homeTeam}</span>
        </div>
        <div class="vs">VS</div>
        <div class="team-slot">
          ${ev.awayLogo ? `<img class="team-logo" src="${ev.awayLogo}">` : `<div class="team-logo" style="display:flex;align-items:center;justify-content:center;background:var(--blue)">${ev.awayTeam[0]}</div>`}
          <span class="team-name">${ev.awayTeam}</span>
        </div>
      </div>
      <div style="margin-top:15px;display:flex;gap:5px">
        <button class="btn-primary" style="flex:1" onclick="quickPost('${ev.id}')">Quick Post</button>
        <button class="btn-outline" onclick="openEditor('${ev.id}')">✏️</button>
      </div>
    </div>
  `).join('');
  document.getElementById('stat-events').textContent = allEvents.length;
}

// ═══════════════════════════════════════════════════════════
// UI & UTILS
// ═══════════════════════════════════════════════════════════
function openPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.textContent = msg;
  c.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

function saveConfig() {
    CFG.blogId = document.getElementById('cfg-blogid').value;
    CFG.clientId = document.getElementById('cfg-clientid').value;
    CFG.imgbbKey = document.getElementById('cfg-imgbb').value;
    localStorage.setItem('s803_cfg', JSON.stringify(CFG));
    toast('Settings Saved', 'success');
}

window.onload = () => {
    const saved = localStorage.getItem('s803_cfg');
    if(saved) {
        CFG = JSON.parse(saved);
        document.getElementById('cfg-blogid').value = CFG.blogId;
        document.getElementById('cfg-clientid').value = CFG.clientId;
        document.getElementById('cfg-imgbb').value = CFG.imgbbKey;
    }
    document.getElementById('stat-leagues').textContent = CFG.activeLeagues.length;
};
</script>
</body>
</html>
