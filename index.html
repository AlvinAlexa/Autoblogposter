<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sports 803 · AI Auto-Post Dashboard v2 (Fixed)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#070809;--s1:#0e1015;--s2:#141720;--s3:#1b1f2c;
  --border:#232738;--border2:#2e3347;--accent:#e8ff47;--accent2:#00d4ff;
  --red:#ff4757;--green:#2ed573;--orange:#ffa502;--purple:#a855f7;
  --text:#eef0f7;--muted:#6b738a;--muted2:#9aa0b8;--r:8px;--r2:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:200;display:flex;align-items:center;height:54px;gap:16px;}
.topbar-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;letter-spacing:-0.02em;}
.topbar-logo .badge{background:var(--accent);color:#070809;font-size:10px;font-weight:800;padding:3px 7px;border-radius:4px;letter-spacing:0.06em;}
.topbar-sub{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.pill.ok{border-color:rgba(46,213,115,.4);color:var(--green);background:rgba(46,213,115,.07);}
.pill.err{border-color:rgba(255,71,87,.4);color:var(--red);background:rgba(255,71,87,.07);}
.pill.dot::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 54px);position:relative;z-index:1;}
.sidebar{background:var(--s1);border-right:1px solid var(--border);padding:24px 20px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;max-height:calc(100vh - 54px);position:sticky;top:54px;}
.sidebar-section{display:flex;flex-direction:column;gap:10px;}
.section-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border);}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-label{font-size:11px;color:var(--muted2);font-weight:500;display:flex;align-items:center;gap:6px;}
.input-label .tip{font-size:9px;background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
input[type="text"],input[type="password"],input[type="number"],input[type="date"],select,textarea{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 11px;border-radius:var(--r);width:100%;outline:none;transition:border-color .15s;}
input[type="text"]:focus,input[type="password"]:focus,input[type="number"]:focus,input[type="date"]:focus,select:focus,textarea:focus{border-color:var(--accent2);}
input[type="date"]{color-scheme:dark;}
select option{background:#141720;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:10px 18px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#070809;}
.btn-primary:hover{background:#f5ff80;transform:translateY(-1px);}
.btn-secondary{background:var(--s3);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-danger{background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.3);}
.btn-danger:hover{background:rgba(255,71,87,.2);}
.btn-purple{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.4);}
.btn-purple:hover{background:rgba(168,85,247,.25);}
.btn-orange{background:rgba(255,165,2,.12);color:var(--orange);border:1px solid rgba(255,165,2,.3);}
.btn-orange:hover{background:rgba(255,165,2,.2);}
.btn-cyan{background:rgba(0,212,255,.1);color:var(--accent2);border:1px solid rgba(0,212,255,.35);}
.btn-cyan:hover{background:rgba(0,212,255,.2);}
.btn-green{background:rgba(46,213,115,.12);color:var(--green);border:1px solid rgba(46,213,115,.35);}
.btn-green:hover{background:rgba(46,213,115,.22);}
.btn-full{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn .spin{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:none;}
.btn.loading .spin{display:block;}
.btn.loading .btn-text{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.leagues-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.league-toggle{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:500;color:var(--muted2);user-select:none;}
.league-toggle.active{border-color:var(--accent);background:rgba(232,255,71,.08);color:var(--text);}
.league-toggle .lcheck{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.league-toggle.active .lcheck{background:var(--accent);border-color:var(--accent);color:#070809;}
.main{padding:28px 28px 60px;overflow-y:auto;}
.main-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;}
.main-title{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;}
.main-title span{color:var(--accent);}
.main-subtitle{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400;}
.scan-actions{display:flex;gap:8px;flex-wrap:wrap;}
.date-bar{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-bar-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);flex-shrink:0;}
.date-quick-btns{display:flex;gap:6px;flex-wrap:wrap;}
.date-quick-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--s2);color:var(--muted2);cursor:pointer;transition:all .15s;}
.date-quick-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.date-quick-btn.active{background:rgba(232,255,71,.1);border-color:var(--accent);color:var(--accent);}
.date-separator{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.date-custom-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:180px;}
.date-custom-wrap input[type="date"]{flex:1;padding:6px 10px;font-size:10px;border-radius:6px;min-width:140px;}
.date-indicator{display:inline-flex;align-items:center;gap:6px;margin-left:auto;background:var(--s3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:0.06em;}
.date-indicator.future{border-color:rgba(0,212,255,.4);color:var(--accent2);background:rgba(0,212,255,.07);}
.date-indicator.today{border-color:rgba(46,213,115,.4);color:var(--green);background:rgba(46,213,115,.07);}
.date-indicator.past{border-color:rgba(255,165,2,.4);color:var(--orange);background:rgba(255,165,2,.07);}
.date-indicator .di-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse-live 1.8s infinite;}
.schedule-notice{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--accent2);display:none;align-items:center;gap:8px;}
.schedule-notice.visible{display:flex;}
.schedule-notice strong{font-weight:800;}
.games-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.game-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .15s;}
.game-card:hover{border-color:var(--border2);}
.game-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.game-teams{flex:1;display:flex;align-items:center;gap:10px;min-width:0;}
.team-block{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.team-logo{width:32px;height:32px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));}
.team-logo-placeholder{width:32px;height:32px;background:var(--s3);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.team-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:56px;}
.vs-score{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--text);letter-spacing:2px;line-height:1;}
.vs-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.vs-label.live-lbl{color:var(--green);animation:pulse-live 1.5s infinite;}
.vs-label.ft-lbl{color:var(--muted);}
.vs-label.pre-lbl{color:var(--accent);}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.5}}
.game-meta-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.league-tag{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:rgba(232,255,71,.1);color:var(--accent);border:1px solid rgba(232,255,71,.2);}
.game-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.game-content-panel{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.content-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:4px;flex-wrap:wrap;}
.ctab{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 12px;border-radius:4px;cursor:pointer;color:var(--muted);border:1px solid transparent;background:none;font-family:'Syne',sans-serif;transition:all .12s;}
.ctab.active{background:var(--s3);border-color:var(--border2);color:var(--text);}
.ctab:hover:not(.active){color:var(--muted2);}
.content-area{min-height:100px;position:relative;}
.content-text{font-size:12px;color:var(--text);line-height:1.7;font-family:'JetBrains Mono',monospace;font-weight:300;white-space:pre-wrap;word-break:break-word;}
.content-empty{display:flex;align-items:center;justify-content:center;height:80px;color:var(--muted);font-size:11px;font-style:italic;letter-spacing:0.04em;}
.content-actions{display:flex;gap:8px;flex-wrap:wrap;}
.thumb-panel{display:flex;flex-direction:column;gap:10px;}
.thumb-preview-wrap{position:relative;border-radius:var(--r);overflow:hidden;background:var(--s2);border:1px solid var(--border);min-height:120px;display:flex;align-items:center;justify-content:center;}
.thumb-preview-img{width:100%;height:auto;display:block;border-radius:var(--r);cursor:zoom-in;transition:transform .2s ease;}
.thumb-preview-img:hover{transform:scale(1.015);}
.thumb-generating{display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 20px;color:var(--muted);font-size:11px;letter-spacing:0.04em;}
.thumb-generating .gen-spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;}
.thumb-actions{display:flex;gap:8px;align-items:center;}
.thumb-size-badge{margin-left:auto;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.04em;}
.thumb-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:lb-in .18s ease;}
@keyframes lb-in{from{opacity:0;}to{opacity:1;}}
.thumb-lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--r2);box-shadow:0 24px 80px rgba(0,0,0,.8);pointer-events:none;}
.thumb-lightbox-close{position:absolute;top:18px;right:22px;font-size:22px;color:var(--muted2);cursor:pointer;line-height:1;transition:color .12s;}
.thumb-lightbox-close:hover{color:var(--text);}
.iframe-row{display:flex;flex-direction:column;gap:5px;}
.iframe-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.04em;display:flex;align-items:center;gap:6px;}
.badge-tip{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(0,212,255,.1);color:var(--accent2);border:1px solid rgba(0,212,255,.2);}
.badge-new{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(46,213,115,.1);color:var(--green);border:1px solid rgba(46,213,115,.3);}
.badge-purple{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.iframe-input{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 10px;border-radius:var(--r);width:100%;outline:none;resize:vertical;transition:border-color .15s;}
.iframe-input:focus{border-color:var(--accent2);}
.post-status{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.post-status.draft{background:rgba(255,165,2,.1);color:var(--orange);border:1px solid rgba(255,165,2,.3);}
.post-status.posted{background:rgba(46,213,115,.1);color:var(--green);border:1px solid rgba(46,213,115,.3);}
.post-status.updated{background:rgba(0,212,255,.1);color:var(--accent2);border:1px solid rgba(0,212,255,.3);}
.post-status.idle{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.post-status.deleted{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3);}
.post-status.linked{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.post-status.scheduled{background:rgba(0,212,255,.1);color:var(--accent2);border:1px solid rgba(0,212,255,.3);}
.log-panel{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;max-height:160px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.8;color:var(--muted);scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.log-line{display:flex;gap:10px;}
.log-line .ts{color:var(--muted);flex-shrink:0;}
.log-line.info .msg{color:var(--muted2);}
.log-line.ok .msg{color:var(--green);}
.log-line.err .msg{color:var(--red);}
.log-line.ai .msg{color:var(--accent2);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted);text-align:center;gap:12px;}
.empty-state .icon{font-size:48px;opacity:.4;}
.empty-state h3{font-size:16px;font-weight:700;color:var(--muted2);}
.empty-state p{font-size:12px;max-width:340px;line-height:1.6;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 18px;font-size:12px;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:380px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(46,213,115,.5);color:var(--green);}
.toast.err{border-color:rgba(255,71,87,.5);color:var(--red);}
.divider{height:1px;background:var(--border);margin:4px 0;}
.settings-note{font-size:10px;color:var(--muted);line-height:1.6;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.settings-note a{color:var(--accent2);}
.google-signin-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;color:#3c3c3c;border:none;border-radius:var(--r);padding:10px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s,box-shadow .15s;}
.google-signin-btn:hover{background:#f0f0f0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.google-signin-btn img{width:18px;height:18px;}
.signed-in-block{display:none;flex-direction:column;gap:10px;}
.signed-in-block.visible{display:flex;}
.user-info-row{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border2);}
.user-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.signout-btn{margin-left:auto;flex-shrink:0;background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25);border-radius:6px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:background .15s;}
.signout-btn:hover{background:rgba(255,71,87,.2);}
.labels-input{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:7px 10px;border-radius:var(--r);width:100%;outline:none;transition:border-color .15s;}
.labels-input:focus{border-color:var(--purple);}
.labels-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.label-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.35);color:var(--purple);font-size:9px;font-weight:600;padding:2px 7px;border-radius:12px;cursor:pointer;}
.label-tag:hover{background:rgba(168,85,247,.25);}
.label-tag .rm{font-size:11px;line-height:1;}
.seo-title-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.seo-title-input{background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;width:100%;outline:none;}
.seo-char-counter{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:4px;}
.seo-char-counter.good{color:var(--green);}
.seo-char-counter.warn{color:var(--orange);}
.seo-char-counter.bad{color:var(--red);}
.post-link-row{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid rgba(46,213,115,.25);border-radius:var(--r);padding:7px 10px;margin-top:4px;}
.post-link-url{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;}
.post-link-url:hover{text-decoration:underline;}
.copy-btn{flex-shrink:0;background:transparent;border:none;cursor:pointer;color:var(--muted2);font-size:13px;padding:0;transition:color .12s;}
.copy-btn:hover{color:var(--green);}
.scheduler-row{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.scheduler-inner{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.scheduler-label{font-size:10px;color:var(--muted2);font-weight:600;}
