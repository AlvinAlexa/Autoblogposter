// ─── SCAN ALL LEAGUES ──────────────────────────────────────────────────────
async function scanAllLeagues() {
  var btn=document.getElementById('scan-btn');
  btn.classList.add('loading'); btn.disabled=true;
  detectedGames=[];
  var selected=LEAGUES.filter(function(l){ return activeLeagues.has(l.id); });
  var scanLabel = formatDateLabel(selectedDate);
  log('info','Scanning '+selected.length+' leagues for '+scanLabel+'...');
  var totalFound=0;
  for (var i=0;i<selected.length;i++) {
    var league=selected[i];
    try {
      if (!league.espn) {
        detectedGames.push({
          espnEvent:{id:'manual-'+league.id+'-'+Date.now(),name:league.name+' Event',
            date:selectedDate+'T12:00:00Z',status:{type:{state:'pre',shortDetail:scanLabel}},
            competitions:[{competitors:[
              {homeAway:'home',team:{displayName:league.name,logo:null},score:'0'},
              {homeAway:'away',team:{displayName:'Live Event',logo:null},score:'0'}
            ],venue:{},headlines:[]}]
          },
          league,preContent:null,highlightContent:null,blogPostId:null,blogPostUrl:null,
          status:'idle',thumbUrl:null,isManual:true,customLabels:[],customTitle:null,
          scheduledPosted:false,gameDate:selectedDate,
          iframeSrc:''   // NEW: store iframe URL
        });
        totalFound++; continue;
      }
      var events=await fetchESPN(league.id);
      events.forEach(function(ev){
        var comps=(ev.competitions&&ev.competitions[0]&&ev.competitions[0].competitors)||[];
        if (comps.length<2) return;
        detectedGames.push({
          espnEvent:ev,league,preContent:null,highlightContent:null,
          blogPostId:null,blogPostUrl:null,status:'idle',thumbUrl:null,
          customLabels:[],customTitle:null,scheduledPosted:false,
          stats:extractStats(ev),gameDate:selectedDate,
          iframeSrc:''   // NEW
        });
        totalFound++;
      });
      log('ok','✓ '+league.name+': '+events.length+' game(s)');
    } catch(e){ log('err','✗ '+league.name+': '+e.message); }
  }
  restorePostStateForAllGames();
  var today = getTodayStr();
  var diff = daysDiff(today, selectedDate);
  var contextStr = diff===0 ? 'today' : diff>0 ? 'on '+scanLabel : 'on '+scanLabel+' (past)';
  document.getElementById('main-subtitle').textContent=totalFound+' game'+(totalFound!==1?'s':'')+
    ' found '+contextStr+' · '+new Date().toLocaleTimeString();
  renderGames();
  btn.classList.remove('loading'); btn.disabled=false;
  var bulkBtn=document.getElementById('bulk-btn');
  if (bulkBtn) bulkBtn.disabled=totalFound===0;
  if (totalFound>0) {
    for (var k=0;k<detectedGames.length;k++) {
      await generatePreviewContent(k);
    }
  }
}

async function postToBlogger(idx, type) {
  var gd = detectedGames[idx], btn = event.currentTarget;
  var blogId = document.getElementById('blog-id').value.trim();
  var pubMode = document.getElementById('publish-mode').value;
  if (!oauthToken || Date.now() >= tokenExpiresAt) { toast('Sign in first', 'err'); return; }
  if (!blogId) { toast('Enter Blog ID first', 'err'); return; }
  if (type === 'highlights' && !gd.highlightContent) { toast('No highlights content yet', 'err'); return; }
  if (type === 'highlights' && !gd.blogPostId) { toast('Post Preview first (or link an existing post)', 'err'); return; }
  if (type === 'preview' && !gd.preContent) { toast('No preview content yet', 'err'); return; }
  btn.classList.add('loading'); btn.disabled = true;
  var success;

  // If scheduler is on and it's a preview for a future game, force SCHEDULED mode
  if (globalSchedulerOn && type === 'preview' && getGameState(gd) === 'pre') {
    var kickoff = gd.espnEvent.date ? new Date(gd.espnEvent.date).getTime() : null;
    if (!kickoff) {
      toast('Cannot schedule: missing kickoff time', 'err');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }
    success = await postToBloggerCore(idx, type, 'SCHEDULED', kickoff);
  } else {
    success = await postToBloggerCore(idx, type, pubMode);
  }

  btn.classList.remove('loading'); btn.disabled = false;
  if (success) renderGames();
}

async function postToBloggerCore(idx, type, pubModeOverride, kickoffTimestamp) {
  var gd = detectedGames[idx];
  var blogId = document.getElementById('blog-id').value.trim();
  var pubMode = pubModeOverride || document.getElementById('publish-mode').value;
  if (!oauthToken || Date.now() >= tokenExpiresAt) { log('err', 'Not signed in'); return false; }
  if (!blogId) { log('err', 'No Blog ID'); return false; }
  if (type === 'preview' && !gd.preContent) { log('err', 'No preview content'); return false; }
  if (type === 'highlights' && (!gd.highlightContent || !gd.blogPostId)) { log('err', 'Cannot post highlights'); return false; }
  var c = getCompetitors(gd), score = getScore(gd);
  var homeName = (c.home.team && c.home.team.displayName) || '?', awayName = (c.away.team && c.away.team.displayName) || '?';
  var titleEl = document.getElementById('seo-title-' + idx);
  var title = (titleEl && titleEl.value.trim()) || gd.customTitle || buildSEOTitle(homeName, awayName, gd.league.name, type, score);
  if (type === 'highlights') title = homeName + ' ' + score.home + '-' + score.away + ' ' + awayName + ' | ' + gd.league.name + ' Highlights | Sports 803';

  // --- FIX: use stored iframeSrc instead of reading from DOM ---
  var iframeSrc = gd.iframeSrc || '';
  var iframeHtml = iframeSrc ? '<div style="margin:18px 0;"><iframe loading="lazy" class="video-iframe" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" allow="encrypted-media" width="100%" height="500" src="' + iframeSrc + '" frameborder="0" scrolling="no" allowfullscreen></iframe></div>' : '';

  var postContent = type === 'preview' ? gd.preContent : gd.highlightContent;
  var thumbSrc = gd.thumbUrl ? await uploadToImgbb(gd.thumbUrl) : null;
  if (thumbSrc && thumbSrc !== gd.thumbUrl && !thumbSrc.startsWith('data:')) gd.thumbUrlHosted = thumbSrc;
  if (type === 'highlights' && gd.thumbUrlHosted) thumbSrc = gd.thumbUrlHosted;
  var thumbImg = thumbSrc ? '<div style="text-align:center;margin-bottom:18px;"><img src="' + thumbSrc + '" alt="' + escHtml(title) + '" style="max-width:100%;height:auto;border-radius:8px;"/></div>' : '';
  var bodyHtml = postContent.split('\n\n').filter(function(p) { return p.trim(); }).map(function(p) { return '<p>' + escHtml(p.trim()) + '</p>'; }).join('\n');
  var statsBlock = '';
  if (gd.stats && (gd.stats.possession || gd.stats.shots) && type === 'highlights') {
    statsBlock = '<div style="background:#111;border:1px solid #333;border-radius:8px;padding:14px;margin:14px 0;font-family:monospace;font-size:12px;color:#ccc;">'
      + '<div style="color:#e8ff47;font-weight:bold;margin-bottom:8px;">📊 Match Stats</div>';
    if (gd.stats.possession) statsBlock += '<div>Possession: ' + homeName + ' ' + gd.stats.possession.home + '% – ' + awayName + ' ' + gd.stats.possession.away + '%</div>';
    if (gd.stats.shots) statsBlock += '<div>Shots: ' + gd.stats.shots.home + ' – ' + gd.stats.shots.away + '</div>';
    if (gd.stats.corners) statsBlock += '<div>Corners: ' + gd.stats.corners.home + ' – ' + gd.stats.corners.away + '</div>';
    if (gd.stats.fouls) statsBlock += '<div>Fouls: ' + gd.stats.fouls.home + ' – ' + gd.stats.fouls.away + '</div>';
    statsBlock += '</div>';
  }
  var allLabels = globalLabels.concat(gd.customLabels || []);
  var htmlContent = '<div style="font-family:Arial,sans-serif;font-size:15px;line-height:1.8;color:#f0f0f0;">' + thumbImg + '\n' + bodyHtml + '\n' + statsBlock + iframeHtml + '\n<p>📺 <strong>Watch Live Free on Sports 803</strong></p></div>';
  try {
    var method, url, body;
    if (type === 'highlights') {
      method = 'PUT';
      url = 'https://www.googleapis.com/blogger/v3/blogs/' + blogId + '/posts/' + gd.blogPostId + '?publish=' + (pubMode === 'LIVE' ? 'true' : 'false');
      body = { id: gd.blogPostId, title, content: htmlContent, labels: allLabels };
    } else if (pubMode === 'SCHEDULED' && kickoffTimestamp) {
      var scheduledDate = new Date(kickoffTimestamp).toISOString();
      method = 'POST';
      url = 'https://www.googleapis.com/blogger/v3/blogs/' + blogId + '/posts/?isDraft=false';
      body = { title, content: htmlContent, labels: allLabels, published: scheduledDate };
    } else {
      method = 'POST';
      url = 'https://www.googleapis.com/blogger/v3/blogs/' + blogId + '/posts/?isDraft=' + (pubMode === 'DRAFT' ? 'true' : 'false');
      body = { title, content: htmlContent, labels: allLabels };
    }
    var r = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + oauthToken }, body: JSON.stringify(body) });
    if (!r.ok) { var err = await r.json().catch(function() { return {}; }); throw new Error((err.error && err.error.message) || 'Blogger ' + r.status); }
    var data = await r.json();
    if (type === 'preview') {
      gd.blogPostId = data.id;
      gd.blogPostUrl = data.url || null;
      gd.status = pubMode === 'SCHEDULED' ? 'scheduled' : pubMode === 'DRAFT' ? 'draft' : 'posted';
    } else {
      gd.blogPostUrl = data.url || gd.blogPostUrl;
      gd.status = 'updated';
    }
    savePostToStorage(gd);
    var modeLabel = pubMode === 'SCHEDULED' ? 'scheduled in Blogger ⏰' : pubMode === 'DRAFT' ? 'saved as draft' : 'published';
    log('ok', '✓ ' + (type === 'preview' ? 'Posted' : 'Highlights updated') + ': ' + title + ' (' + modeLabel + ')');
    toast('✓ ' + (type === 'preview' ? 'Preview' : 'Highlights') + ' ' + modeLabel + '!', 'ok');
    return true;
  } catch (e) {
    toast('Post failed: ' + e.message, 'err');
    log('err', 'Blogger error: ' + e.message);
    return false;
  }
}

function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ─── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  loadConfig();
  buildLeaguesGrid();
  renderGlobalLabels();
  var inp = document.getElementById('custom-date-input');
  if (inp) inp.value = selectedDate;
  var todayBtn = document.getElementById('dq-today');
  if (todayBtn) { updateAllQuickBtns(todayBtn); }
  updateDateIndicator();
  setInterval(autoRefreshScores, 3 * 60 * 1000);
  setInterval(checkScheduledPosts, 60 * 1000);
});
